services:
  memgraph:
    build: .
    container_name: memgraph-tsp
    ports:
      - "8687:7687"
      - "7444:7444"
    volumes:
      - memgraph_data:/var/lib/memgraph
      - ./setup.cypher:/docker-entrypoint-initdb.d/setup.cypher
      - ./tsp_mage.py:/usr/lib/memgraph/query_modules/tsp_mage.py
    command: ["--log-level=TRACE"]
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --no-history || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

volumes:
  memgraph_data:
